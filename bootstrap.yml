---
- name: Host OS Provisioning
  hosts: localhost
  connection: local
  become: true # Requires sudo privileges
  tasks:
    - name: Ensure OS-agnostic base packages are installed
      ansible.builtin.package:
        name:
          - stow
          - zsh
          - fzf
          - git
          - curl
          - ripgrep
          - plocate
          - btop
        state: present

    # Package names can sometimes vary by distro. Docker is handled dynamically here.
    - name: Ensure Docker is installed
      ansible.builtin.package:
        name: "{{ 'docker.io' if ansible_os_family == 'Debian' else 'docker' }}"
        state: present

    # Newer Rust-based tools might not be in the default repos of older distros.
    # If your distro fails here, you can easily move these to the Nix installation step.
    - name: Ensure modern CLI tools are installed
      ansible.builtin.package:
        name:
          - bat
          - eza
          - dust
          - procs
          - git-delta
        state: present
      ignore_errors: true # Prevents the playbook from failing if a distro lacks these packages

    - name: Install Nix (Determinate Systems Installer)
      ansible.builtin.shell: >
        curl --proto '=https' --tlsv1.2 -sSf -L https://install.determinate.systems/nix | 
        sh -s -- install --no-confirm
      args:
        creates: /nix/var/nix/profiles/default

- name: User Environment Setup
  hosts: localhost
  connection: local
  become: false # Run as your standard user
  vars:
    repo_url: "https://git@github.com:william-tjandra/nix-config.git"
    nix_config_dir: "{{ ansible_env.HOME }}/.config/nix-config"
    dotfiles_dir: "{{ ansible_env.HOME }}/.config/nix-config/dotfiles"
    nix_bin: "/nix/var/nix/profiles/default/bin"

  tasks:
    - name: Clone nix-config repository
      ansible.builtin.git:
        repo: "{{ repo_url }}"
        dest: "{{ nix_config_dir }}"
        accept_hostkey: yes
        update: yes

    - name: Ensure .config directory exists to prevent stow folding
      ansible.builtin.file:
        path: "{{ ansible_env.HOME }}/.config"
        state: directory
        mode: '0755'

    - name: Install Stow and remaining packages via Nix
      ansible.builtin.command:
        cmd: "{{ nix_bin }}/nix profile add .#default"
      # If you have a custom flake command to install your user packages, replace the cmd above.
      # Example: cmd: "{{ nix_bin }}/nix profile install path:{{ nix_config_dir }}#my-packages"

    - name: Stow dotfiles
      ansible.builtin.command:
        cmd: "{{ nix_bin }}/stow --target={{ ansible_env.HOME }} --dir={{ dotfiles_dir }} ."
      environment:
        PATH: "{{ nix_bin }}:{{ ansible_env.PATH }}"
      # We explicitly pass the Nix bin path to the environment so Ansible can find 'stow'
      # without needing to source the Nix environment first.
